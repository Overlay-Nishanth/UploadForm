<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR Memory | Elite</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');

  :root {
    --neon: #00ff99;
    --neon-muted: rgba(0, 255, 153, 0.15);
    --bg-black: #080808;
    --surface: #121212;
  }

  body {
    margin: 0;
    padding: 0;
    font-family: 'Space Grotesk', sans-serif;
    background-color: var(--bg-black);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* Decorative Background Elements */
  .bg-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
    z-index: -1;
  }

  .card-elite {
    width: 90%;
    max-width: 370px;
    background: var(--surface);
    border-radius: 40px;
    padding: 40px 25px;
    box-shadow: 0 0 50px rgba(0,0,0,1), inset 0 1px 1px rgba(255,255,255,0.1);
    text-align: center;
    position: relative;
    border: 1px solid #222;
  }

  .status-pill {
    display: inline-block;
    padding: 4px 12px;
    background: #000;
    border: 1px solid #333;
    border-radius: 100px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: #666;
    margin-bottom: 25px;
  }

  h2 {
    font-size: 28px;
    margin: 0;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .desc {
    color: #555;
    font-size: 14px;
    margin-bottom: 30px;
  }

  /* Holographic Drop Zone */
  .holo-zone {
    width: 100%;
    aspect-ratio: 1/1;
    background: #000;
    border-radius: 30px;
    margin-bottom: 30px;
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    position: relative;
    transition: 0.4s;
    overflow: hidden;
  }

  .holo-zone:hover {
    border-color: var(--neon);
    box-shadow: 0 0 20px var(--neon-muted);
  }

  .holo-zone::after {
    content: "";
    position: absolute;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.03), transparent);
    transform: rotate(45deg);
    animation: shine 4s infinite;
  }

  @keyframes shine {
    0% { transform: translateX(-100%) rotate(45deg); }
    100% { transform: translateX(100%) rotate(45deg); }
  }

  #videoPreview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    z-index: 2;
  }

  .upload-prompt {
    z-index: 1;
    transition: 0.3s;
  }

  /* The Elite Button */
  .btn-elite {
    width: 100%;
    padding: 22px;
    border-radius: 20px;
    border: none;
    background: linear-gradient(135deg, #fff 0%, #d1d1d1 100%);
    color: #000;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .btn-elite:hover {
    background: var(--neon);
    box-shadow: 0 15px 30px var(--neon-muted);
    transform: translateY(-3px);
  }

  /* Linear Progress */
  .progress-wrap {
    margin-top: 30px;
    display: none;
  }

  .bar-container {
    width: 100%;
    height: 2px;
    background: #222;
    position: relative;
  }

  .bar-fill {
    height: 100%;
    width: 0%;
    background: var(--neon);
    box-shadow: 0 0 10px var(--neon);
    transition: width 0.5s ease;
  }

  #status-msg {
    margin-top: 12px;
    font-size: 11px;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  input[type="file"] { display: none; }

  /* Toast */
  #toast {
    visibility: hidden;
    position: fixed;
    top: 20px;
    background: #ff3333;
    color: white;
    padding: 10px 25px;
    border-radius: 50px;
    font-size: 12px;
    font-weight: bold;
    z-index: 1000;
  }
  #toast.show { visibility: visible; animation: dropDown 2.5s; }

  @keyframes dropDown {
    0% { transform: translateY(-50px); opacity: 0; }
    15% { transform: translateY(0); opacity: 1; }
    85% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-50px); opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="card-elite">
  <div class="status-pill">System Ready • <span id="productLabel">...</span></div>
  
  <h2>Activate AI Gift</h2>
  <p class="desc">Link your to a your Video</p>

  <div class="holo-zone" onclick="document.getElementById('videoFile').click()">
    <div class="upload-prompt" id="promptText">
      <div style="font-size: 40px; margin-bottom: 10px; filter: grayscale(1);">⚡</div>
      <div style="font-weight: 500;">CHOOSE MEMORY</div>
    </div>
    <video id="videoPreview" autoplay muted loop playsinline></video>
  </div>

  <input type="hidden" id="productId">
  <input type="file" id="videoFile" accept="video/*" onchange="previewFile(this)">

  <button class="btn-elite" id="uploadBtn" onclick="initiateUpload()">Upload & Link</button>

  <div class="progress-wrap" id="progressBox">
    <div class="bar-container">
      <div class="bar-fill" id="progressBar"></div>
    </div>
    <div id="status-msg">Awaiting data...</div>
  </div>
</div>

<div id="toast">SYSTEM RESTRICTION: ACTION BLOCKED</div>

<script>
// --- FUNCTIONALITY (MAINTAINED) ---
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyZ8QA9H-1tD6P1exSj4UX-kupANKjQDJ_W3_t6jnTaaqH7IcGR5Ye1lBM9pLnygySBuA/exec";

// Security - Anti-Inspect
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener("keydown", e => {
  if (e.key === "F12" || (e.ctrlKey && e.shiftKey && "IJC".includes(e.key)) || (e.ctrlKey && e.key === "u")) {
    e.preventDefault();
    const t = document.getElementById("toast");
    t.className = "show";
    setTimeout(() => { t.className = ""; }, 2500);
  }
});

// Load Configuration
window.onload = () => {
  const pId = new URLSearchParams(window.location.search).get("product");
  if(pId) {
    document.getElementById("productId").value = pId;
    document.getElementById("productLabel").innerText = pId;
  } else {
    document.getElementById("status-msg").innerText = "Error: Invalid Handshake";
    document.getElementById("uploadBtn").disabled = true;
  }
};

// Holographic Preview
function previewFile(input) {
  const file = input.files[0];
  if (file) {
    document.getElementById('promptText').style.display = 'none';
    const preview = document.getElementById('videoPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'block';
  }
}

// Upload Logic
async function initiateUpload() {
  const file = document.getElementById("videoFile").files[0];
  const pId = document.getElementById("productId").value;
  const status = document.getElementById("status-msg");
  const bar = document.getElementById("progressBar");
  const box = document.getElementById("progressBox");
  const btn = document.getElementById("uploadBtn");

  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { status.innerText = "OVERSIZE DETECTED (MAX 10MB)"; return; }

  btn.disabled = true;
  btn.innerText = "Syncing...";
  box.style.display = "block";
  bar.style.width = "30%";

  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => {
    const base64 = reader.result.split(',')[1];
    bar.style.width = "60%";
    status.innerText = "Encrypting memory packet...";
    
    try {
      // POST logic remains the same to ensure it works with your script
      await fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        cache: "no-cache",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ productId: pId, file: base64, fileName: file.name })
      });

      bar.style.width = "100%";
      status.style.color = "var(--neon)";
      status.innerText = "Data Transferred Successfully";
      btn.innerText = "Linked";
      
    } catch (err) {
      status.innerText = "UPLINK FAILED. RETRY.";
      btn.disabled = false;
      btn.innerText = "Retry Link";
    }
  };
}
</script>

</body>
</html>
